<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CantiereE — Prototipo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--card:#FFF;--pri:#1565C0;--pri-dk:#0D47A1;--acc:#FF8F00;--txt:#1A1A2E;--txt2:#5C6370;--brd:#E2E6EA;--grn:#2E7D32;--grn-bg:#E8F5E9;--org:#E65100;--org-bg:#FFF3E0;--pri-lt:#E3F2FD}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#E8E8E8;color:var(--txt);overflow:hidden;height:100dvh}
#app{max-width:430px;margin:0 auto;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}
.hdr{background:var(--pri-dk);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100}
.hdr-bk{background:0 0;border:none;padding:4px;cursor:pointer;display:flex;color:#fff}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:12px;opacity:.8;font-weight:400}
.hdr-r{margin-left:auto}
.hdr-btn{background:rgba(255,255,255,.15);border:none;border-radius:12px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.bd{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch;-ms-overflow-style:none;scrollbar-width:none}
.bd::-webkit-scrollbar{display:none}
.tbar{display:flex;background:#fff;border-top:1px solid var(--brd);flex-shrink:0;z-index:100}
.tb{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:500;color:var(--txt2);background:0 0;border:none;cursor:pointer;position:relative;font-family:inherit}
.tb.a{font-weight:700;color:var(--pri)}
.tb svg{width:22px;height:22px}
.bg{position:absolute;top:4px;right:calc(50% - 26px);background:var(--acc);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sb{display:flex;align-items:center;gap:10px;padding:12px 20px;background:#fff;border-bottom:2px solid var(--pri);position:sticky;top:0;z-index:50}
.sb input{flex:1;border:none;outline:none;font-size:16px;font-weight:500;color:var(--txt);background:0 0;font-family:inherit}
.sb .x{background:0 0;border:none;font-size:20px;color:var(--txt2);cursor:pointer;padding:4px}
.sl{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center}
.sl-t{font-size:13px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:1px}
.sl-c{font-size:13px;font-weight:700;color:var(--pri)}
.lc{display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fff;border-bottom:1px solid var(--brd);cursor:pointer}
.lc:active{background:#F0F4F8}
.la{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.la.h{background:var(--pri-lt);color:var(--pri)}
.la.e{background:#F0F0F0;color:var(--txt2)}
.ln{font-weight:700;font-size:16px}
.ld{font-size:12px;color:var(--txt2);margin-top:2px}
.lp{margin-left:auto;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.la2{color:var(--txt2);font-size:20px;margin-left:auto}
.ch{display:flex;align-items:center;padding:14px 20px;background:#fff;border-bottom:1px solid var(--brd);cursor:pointer;font-weight:700;font-size:15px;gap:10px}
.ch:active,.ch.o{background:var(--pri);color:#fff}
.cc{font-size:12px;font-weight:500;opacity:.7}
.ca{margin-left:auto;transition:transform .2s;font-size:18px}
.ch.o .ca{transform:rotate(90deg)}
.ir{display:flex;align-items:center;padding:12px 20px 12px 36px;border-bottom:1px solid var(--brd);background:#fff;gap:10px}
.ii{flex:1;min-width:0}
.in{font-size:14px;font-weight:500;line-height:1.3}
.im{font-size:11px;color:var(--txt2);margin-top:2px}
.ab{min-width:48px;height:48px;border-radius:12px;background:var(--pri);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ab:active{background:var(--pri-dk)}
.qc{display:flex;align-items:center;border-radius:12px;border:2px solid var(--pri);flex-shrink:0;overflow:hidden}
.qb{width:40px;height:44px;display:flex;align-items:center;justify-content:center;background:0 0;border:none;color:var(--pri);cursor:pointer;font-weight:700;font-size:20px;font-family:inherit}
.qb:active{background:var(--pri-lt)}
.qv{min-width:36px;text-align:center;font-weight:700;font-size:16px;color:var(--pri)}
.cr{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--brd);background:#fff;gap:12px;cursor:pointer}
.cr:active{background:#F8F8F8}
.cb{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.off{border:2px solid var(--brd);background:#fff}
.cb.on{border:none;background:var(--grn)}
.vb{padding:6px 12px;border-radius:8px;border:1px solid var(--org);background:var(--org-bg);color:var(--org);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit}
.vg{font-size:11px;font-weight:700;color:var(--org);background:var(--org-bg);padding:2px 8px;border-radius:6px}
.isb{padding:14px 20px;background:var(--grn-bg);display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--grn)}
.sc{margin:12px 16px;padding:16px 20px;background:#fff;border-radius:16px;border:1px solid var(--brd)}
.sc h3{font-size:16px;font-weight:800;margin-bottom:8px}
.sc p{font-size:13px;color:var(--txt2);margin-top:4px}
.cd{padding:10px 20px;background:var(--pri-lt);font-weight:700;font-size:13px;color:var(--pri-dk);text-transform:uppercase;letter-spacing:.5px}
.sr{display:flex;padding:10px 20px;border-bottom:1px solid var(--brd);background:#fff;align-items:center}
.sr .n{flex:1;font-size:14px;font-weight:500}
.sr .q{font-weight:700;font-size:15px;color:var(--pri);min-width:60px;text-align:right}
.gb{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 40px);margin:20px auto;padding:16px;border-radius:14px;background:var(--pri);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.gb:active{background:var(--pri-dk)}
.fab{position:absolute;bottom:90px;right:20px;width:60px;height:60px;border-radius:20px;background:var(--acc);color:#fff;border:none;box-shadow:0 6px 24px rgba(255,143,0,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:90}
.fab:active{transform:scale(.93)}
.tst{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:var(--pri-dk);color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.25);pointer-events:none;white-space:nowrap;animation:ti .2s ease-out}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mo{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.mc{width:100%;max-height:80vh;background:#fff;border-radius:24px 24px 0 0;overflow:auto;padding:24px 20px 40px}
.mt{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--pri-dk)}
.ms{font-size:13px;color:var(--txt2);margin-bottom:16px}
.fl{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.cg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.cp{padding:10px 16px;border-radius:10px;border:1px solid var(--brd);background:#fff;color:var(--txt);font-weight:500;font-size:14px;cursor:pointer;font-family:inherit}
.cp.s{border:2px solid var(--pri);background:var(--pri-lt);color:var(--pri);font-weight:700}
.mi{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--brd);font-size:15px;font-weight:500;color:var(--txt);outline:none;margin-bottom:12px;font-family:inherit}
.mi:focus{border-color:var(--pri)}
.msv{width:100%;padding:16px;border-radius:14px;background:var(--pri);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.es{padding:60px 40px;text-align:center;color:var(--txt2)}
.es .ei{font-size:48px;margin-bottom:12px}
.es .et{font-weight:600;font-size:16px}
.es .ed{font-size:13px;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const C=[{cat:"Protezioni",items:[{id:"p1",nome:"Int. magnetotermico 1P+N C10",norma:"CEI EN 60898-1",um:"pz"},{id:"p2",nome:"Int. magnetotermico 1P+N C16",norma:"CEI EN 60898-1",um:"pz"},{id:"p3",nome:"Int. magnetotermico 1P+N C20",norma:"CEI EN 60898-1",um:"pz"},{id:"p4",nome:"Int. magnetotermico 1P+N C25",norma:"CEI EN 60898-1",um:"pz"},{id:"p5",nome:"Diff.le 2P 25A 30mA tipo A",norma:"CEI EN 61008-1",um:"pz"},{id:"p6",nome:"Diff.le 2P 40A 30mA tipo A",norma:"CEI EN 61008-1",um:"pz"},{id:"p7",nome:"SPD Tipo 2",norma:"CEI EN 61643-11",um:"pz"}]},{cat:"Cavi",items:[{id:"c1",nome:"FG16OR16 3G1,5",norma:"CEI 20-13",um:"m"},{id:"c2",nome:"FG16OR16 3G2,5",norma:"CEI 20-13",um:"m"},{id:"c3",nome:"FG16OR16 5G2,5",norma:"CEI 20-13",um:"m"},{id:"c4",nome:"FG16OR16 5G4",norma:"CEI 20-13",um:"m"},{id:"c5",nome:"N07V-K 1G1,5 (G/V)",norma:"CEI 20-22",um:"m"},{id:"c6",nome:"N07V-K 1G2,5 (G/V)",norma:"CEI 20-22",um:"m"},{id:"c7",nome:"Cavo dati UTP Cat.6",norma:"CEI EN 50173",um:"m"}]},{cat:"Frutti e placche",items:[{id:"f1",nome:"Presa 2P+T 10/16A",norma:"CEI 23-50",um:"pz"},{id:"f2",nome:"Presa Schuko 2P+T 16A",norma:"CEI 23-50",um:"pz"},{id:"f3",nome:"Interruttore 1P 10A",norma:"CEI 23-9",um:"pz"},{id:"f4",nome:"Deviatore 1P 10A",norma:"CEI 23-9",um:"pz"},{id:"f5",nome:"Pulsante 1P 10A NO",norma:"CEI 23-9",um:"pz"},{id:"f6",nome:"Presa TV passante",norma:"CEI EN 50083",um:"pz"},{id:"f7",nome:"Presa RJ45 Cat.6",norma:"CEI EN 50173",um:"pz"},{id:"f8",nome:"Placca 3 moduli",norma:"",um:"pz"},{id:"f9",nome:"Placca 4 moduli",norma:"",um:"pz"}]},{cat:"Scatole e tubi",items:[{id:"s1",nome:"Scatola incasso 503 (3 mod)",norma:"CEI 23-48",um:"pz"},{id:"s2",nome:"Scatola incasso 504 (4 mod)",norma:"CEI 23-48",um:"pz"},{id:"s3",nome:"Scatola derivazione 100x100",norma:"CEI 23-48",um:"pz"},{id:"s4",nome:"Tubo corrugato ø20",norma:"CEI EN 61386",um:"m"},{id:"s5",nome:"Tubo corrugato ø25",norma:"CEI EN 61386",um:"m"},{id:"s6",nome:"Tubo rigido PVC ø20",norma:"CEI EN 61386",um:"m"}]},{cat:"Quadri",items:[{id:"q1",nome:"Centralino incasso 12 mod",norma:"CEI EN 61439-3",um:"pz"},{id:"q2",nome:"Centralino incasso 24 mod",norma:"CEI EN 61439-3",um:"pz"},{id:"q3",nome:"Centralino parete 12 mod IP40",norma:"CEI EN 61439-3",um:"pz"},{id:"q4",nome:"Barra DIN 35mm",norma:"CEI EN 60715",um:"pz"}]},{cat:"Illuminazione",items:[{id:"l1",nome:"Punto luce a soffitto",norma:"",um:"pz"},{id:"l2",nome:"Punto luce a parete",norma:"",um:"pz"},{id:"l3",nome:"Faretto incasso LED",norma:"CEI EN 60598",um:"pz"},{id:"l4",nome:"Plafoniera LED",norma:"CEI EN 60598",um:"pz"},{id:"l5",nome:"Lampada emergenza SE",norma:"CEI EN 60598-2-22",um:"pz"}]}];
const L=[{id:"loc1",nome:"Ingresso"},{id:"loc2",nome:"Soggiorno"},{id:"loc3",nome:"Cucina"},{id:"loc4",nome:"Camera da letto"},{id:"loc5",nome:"Bagno"},{id:"loc6",nome:"Quadro generale"}];
const MK=["ABB","BTicino","Schneider","Gewiss","Vimar","Siemens","Hager","Finder"];
const I={bk:'<polyline points="15 18 9 12 15 6"/>',cl:'<rect x="9" y="2" width="6" height="4" rx="1"/><path d="M4 6h16v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path d="M9 14l2 2 4-4"/>',ck:'<polyline points="20 6 9 17 4 12"/>',pl:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',se:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',dc:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',cm:'<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>',sw:'<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>'};
const sv=(d,z=22,c="currentColor")=>`<svg width="${z}" height="${z}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;

let S={scr:"locali",mod:1,loc:null,co:null,q:"",mat:{},inst:{},ml:null};
const $=id=>document.getElementById(id);
const gmc=id=>(S.mat[id]||[]).reduce((s,m)=>s+m.qty,0);
const gtm=()=>Object.values(S.mat).flat().reduce((s,m)=>s+m.qty,0);
const gti=()=>Object.keys(S.inst).length;
const glic=id=>Object.keys(S.inst).filter(k=>k.startsWith(id+"_")).length;
const fi=id=>C.flatMap(c=>c.items).find(i=>i.id===id);

function am(lid,iid){const it=fi(iid);if(!it)return;if(!S.mat[lid])S.mat[lid]=[];const e=S.mat[lid].find(m=>m.id===iid);if(e)e.qty++;else S.mat[lid].push({...it,qty:1});R();T("+ "+it.nome)}
function uq(lid,iid,d){const a=S.mat[lid]||[];const m=a.find(x=>x.id===iid);if(m){m.qty=Math.max(0,m.qty+d);if(m.qty===0)S.mat[lid]=a.filter(x=>x.id!==iid)}R()}
function ti2(lid,iid){const k=lid+"_"+iid;if(S.inst[k])delete S.inst[k];else{const o=(S.mat[lid]||[]).find(m=>m.id===iid);S.inst[k]={...o,marchio:"",modello:"",variante:false}}R()}
function sv2(lid,iid,d){const k=lid+"_"+iid;if(S.inst[k])Object.assign(S.inst[k],d,{variante:true});R()}

let tt;function T(m){clearTimeout(tt);const e=document.createElement("div");e.className="tst";e.textContent=m;$("app").appendChild(e);tt=setTimeout(()=>e.remove(),2000)}

function R(){
  const scr=S.scr,mod=S.mod;let ht="",hts="",sb=false,pb=false;
  if(scr==="locali"){ht=mod===1?"Sopralluogo":"Tracciamento installato";hts="Appartamento Rossi · Via Roma 15"}
  else if(scr==="catalogo"){ht=S.loc.nome;hts="Seleziona materiali";sb=pb=true}
  else if(scr==="installato"){ht=S.loc.nome;hts="Conferma installazione";sb=true}
  else if(scr==="riepilogo"){ht="Lista acquisti";hts="Riepilogo completo";sb=true}

  let h=`<div class="hdr">`;
  if(sb)h+=`<button class="hdr-bk" onclick="GB()">${sv(I.bk,24,"#fff")}</button>`;
  h+=`<div><div class="hdr-t">${ht}</div><div class="hdr-s">${hts}</div></div>`;
  if(pb)h+=`<div class="hdr-r"><button class="hdr-btn" onclick="GS('riepilogo')">${sv(I.dc,16,"#fff")} PDF</button></div>`;
  h+=`</div><div class="bd">`;

  if(scr==="locali")h+=rL();
  else if(scr==="catalogo")h+=rC();
  else if(scr==="installato")h+=rI();
  else if(scr==="riepilogo")h+=rR();
  h+=`</div>`;

  if(scr==="catalogo"||scr==="installato")h+=`<button class="fab" onclick="T('📸 Foto salvata per ${S.loc?.nome||""}')">${sv(I.cm,28,"#fff")}</button>`;

  const tm=gtm(),ti=gti();
  h+=`<div class="tbar">`;
  h+=`<button class="tb ${mod===1&&scr!=="riepilogo"?"a":""}" onclick="SM(1)">${sv(I.cl,22)}${tm?`<span class="bg">${tm}</span>`:""}<span>Sopralluogo</span></button>`;
  h+=`<button class="tb ${mod===2?"a":""}" onclick="SM(2)">${sv(I.ck,22)}${ti?`<span class="bg">${ti}</span>`:""}<span>Installato</span></button>`;
  h+=`<button class="tb ${scr==="riepilogo"?"a":""}" onclick="GS('riepilogo')">${sv(I.dc,22)}<span>Documenti</span></button>`;
  h+=`</div>`;

  $("app").innerHTML=h;
  if(S.ml)rM();
  if(scr==="catalogo"){const inp=document.querySelector(".sb input");if(inp&&S.q){inp.value=S.q}}
}

function rL(){
  let h=`<div class="sl"><div class="sl-t">${S.mod===1?"Seleziona locale":"Stato installazione"}</div><div class="sl-c">${S.mod===1?gtm()+" articoli":gti()+" installati"}</div></div>`;
  L.forEach(l=>{
    const mc=gmc(l.id),ic=glic(l.id),ml=(S.mat[l.id]||[]).length;
    h+=`<div class="lc" onclick="SL('${l.id}')"><div class="la ${mc?"h":"e"}">${l.nome[0]}</div><div><div class="ln">${l.nome}</div><div class="ld">${mc?mc+" mat.":"Nessun materiale"}${S.mod===2&&mc?" · "+ic+"/"+ml+" installati":""}</div></div>`;
    if(S.mod===2&&mc){const p=ml?Math.round(ic/ml*100):0,dn=ic===ml&&ml;h+=`<div class="lp" style="background:${dn?"var(--grn-bg)":"#F0F0F0"};color:${dn?"var(--grn)":"var(--txt2)"}">${dn?sv(I.ck,20,"var(--grn)"):p+"%"}</div>`}
    if(S.mod===1)h+=`<div style="margin-left:auto;font-size:13px;font-weight:600;color:var(--txt2)">${mc||""}</div>`;
    h+=`<span class="la2">›</span></div>`;
  });
  return h;
}

function rC(){
  const lid=S.loc.id,lm=S.mat[lid]||[];
  const gq=id=>(lm.find(m=>m.id===id)||{}).qty||0;
  let h=`<div class="sb">${sv(I.se,20,"var(--txt2)")}<input placeholder="Cerca materiale..." oninput="DS(this.value)" value="${S.q||""}">`;
  if(S.q)h+=`<button class="x" onclick="DS('')">✕</button>`;
  h+=`</div>`;

  if(S.q&&S.q.length>=2){
    const al=C.flatMap(c=>c.items.map(i=>({...i,cat:c.cat})));
    const f=al.filter(i=>i.nome.toLowerCase().includes(S.q.toLowerCase())||i.cat.toLowerCase().includes(S.q.toLowerCase()));
    if(!f.length)h+=`<div class="es"><div class="et">Nessun risultato per "${S.q}"</div></div>`;
    else f.forEach(i=>{h+=iR(i,gq(i.id),lid,i.cat)});
  }else{
    C.forEach(c=>{
      const o=S.co===c.cat;
      h+=`<div class="ch ${o?"o":""}" onclick="TC('${c.cat}')"><span>${c.cat}</span><span class="cc">(${c.items.length})</span><span class="ca">›</span></div>`;
      if(o)c.items.forEach(i=>{h+=iR(i,gq(i.id),lid)});
    });
  }
  return h;
}

function iR(it,qty,lid,ex){
  let h=`<div class="ir"><div class="ii"><div class="in">${it.nome}</div>`;
  const nt=(ex?ex+" · ":"")+(it.norma||"");
  if(nt)h+=`<div class="im">${nt}</div>`;
  h+=`</div>`;
  if(qty)h+=`<div class="qc"><button class="qb" onclick="event.stopPropagation();uq('${lid}','${it.id}',-1)">−</button><span class="qv">${qty}</span><button class="qb" onclick="event.stopPropagation();uq('${lid}','${it.id}',1)">+</button></div>`;
  else h+=`<button class="ab" onclick="event.stopPropagation();am('${lid}','${it.id}')">${sv(I.pl,22,"#fff")}</button>`;
  return h+`</div>`;
}

function rI(){
  const lid=S.loc.id,lm=S.mat[lid]||[];
  if(!lm.length)return`<div class="es"><div class="ei">📋</div><div class="et">Nessun materiale previsto</div><div class="ed">Vai al Modulo 1 per aggiungere materiali</div></div>`;
  const ic=glic(lid);
  let h=`<div class="isb"><span>${ic} / ${lm.length} installati</span><span>Tocca per confermare ✓</span></div>`;
  lm.forEach(it=>{
    const k=lid+"_"+it.id,chk=!!S.inst[k],ins=S.inst[k];
    h+=`<div class="cr" onclick="ti2('${lid}','${it.id}')"><div class="cb ${chk?"on":"off"}">${chk?sv(I.ck,20,"#fff"):""}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px;color:${chk?"var(--grn)":"var(--txt)"}">${it.nome}</div><div style="font-size:12px;color:var(--txt2);margin-top:2px">Prev: ${it.qty} ${it.um}`;
    if(ins?.variante)h+=` <span class="vg">VARIANTE</span>`;
    if(ins?.marchio)h+=` <span style="margin-left:8px;color:var(--pri);font-weight:600">${ins.marchio} ${ins.modello}</span>`;
    h+=`</div></div>`;
    if(chk)h+=`<button class="vb" onclick="event.stopPropagation();OM('${lid}','${it.id}')">${sv(I.sw,14,"var(--org)")} Dettaglia</button>`;
    h+=`</div>`;
  });
  return h;
}

function rR(){
  const tot={};Object.values(S.mat).flat().forEach(m=>{if(tot[m.id])tot[m.id].qty+=m.qty;else tot[m.id]={...m}});
  const ar=Object.values(tot).sort((a,b)=>a.nome.localeCompare(b.nome));
  const bc={};ar.forEach(m=>{const cn=C.find(c=>c.items.some(i=>i.id===m.id))?.cat||"Altro";if(!bc[cn])bc[cn]=[];bc[cn].push(m)});
  if(!ar.length)return`<div class="es"><div class="ei">📄</div><div class="et">Nessun materiale aggiunto</div><div class="ed">Inizia dal sopralluogo per aggiungere materiali</div></div>`;
  let h=`<div class="sc"><h3>📄 Riepilogo lista acquisti</h3><p><strong>Cantiere:</strong> Appartamento Rossi · Via Roma 15, Borgia (CZ)</p><p>${ar.length} voci · ${ar.reduce((s,m)=>s+m.qty,0)} pezzi/metri totali</p></div>`;
  Object.entries(bc).forEach(([c,its])=>{
    h+=`<div class="cd">${c}</div>`;
    its.forEach(m=>{h+=`<div class="sr"><div class="n">${m.nome}</div><div class="q">${m.qty} ${m.um}</div></div>`});
  });
  h+=`<button class="gb" onclick="T('✅ PDF generato! Pronto per condivisione via WhatsApp/email')">${sv(I.dc,20,"#fff")} Genera PDF lista acquisti</button>`;
  return h;
}

function OM(lid,iid){const ins=S.inst[lid+"_"+iid];S.ml={lid,iid,marchio:ins?.marchio||"",modello:ins?.modello||""};R()}
function rM(){
  const m=S.ml,itn=(S.mat[m.lid]||[]).find(x=>x.id===m.iid)?.nome||"";
  let h=`<div class="mo" onclick="CM()"><div class="mc" onclick="event.stopPropagation()"><div class="mt">Dettaglia materiale installato</div><div class="ms">${itn}</div><div class="fl">Marchio</div><div class="cg">`;
  MK.forEach(b=>{h+=`<button class="cp ${m.marchio===b?"s":""}" onclick="SMK('${b}')">${b}</button>`});
  h+=`</div><div class="fl">Modello / Codice articolo</div><input class="mi" placeholder="Es. S201C16 NA" value="${m.modello||""}" oninput="S.ml.modello=this.value"><button class="msv" onclick="SVM()">Salva dettaglio</button></div></div>`;
  $("app").insertAdjacentHTML("beforeend",h);
}
function SMK(b){S.ml.marchio=b;R()}
function CM(){S.ml=null;R()}
function SVM(){const m=S.ml;sv2(m.lid,m.iid,{marchio:m.marchio,modello:m.modello});S.ml=null;R();T("Dettaglio salvato ✓")}

function GB(){S.scr="locali";S.loc=null;S.co=null;S.q="";R()}
function GS(s){S.scr=s;R()}
function SM(m){S.mod=m;S.scr="locali";S.loc=null;S.co=null;S.q="";R()}
function SL(id){S.loc=L.find(l=>l.id===id);S.scr=S.mod===1?"catalogo":"installato";S.co=null;S.q="";R()}
function TC(c){S.co=S.co===c?null:c;R()}
function DS(v){S.q=v;R();const inp=document.querySelector(".sb input");if(inp){inp.focus();inp.setSelectionRange(v.length,v.length)}}

R();
</script>
</body>
